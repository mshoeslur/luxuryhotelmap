<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Luxury Hotels · Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;color:#111;background:#fff}
#wrap{display:flex;flex-direction:column;height:100vh}
#bar{display:flex;align-items:center;gap:10px;padding:0 14px;height:44px;background:#fff;border-bottom:1px solid #e8e8e8;flex-shrink:0;z-index:1000}
#logo{font-size:14px;font-weight:500;white-space:nowrap;letter-spacing:-.3px;flex-shrink:0}
#logo em{font-style:normal;opacity:.35}
#sw{max-width:180px;width:100%;position:relative;flex-shrink:0}
#si{width:100%;padding:5px 10px 5px 26px;border:1px solid #e0e0e0;border-radius:8px;font-size:12px;background:#f7f7f7;color:#111;outline:none}
#si:focus{border-color:#bbb;background:#fff}
#sicon{position:absolute;left:8px;top:50%;transform:translateY(-50%);opacity:.35;font-size:11px;pointer-events:none}
#nav{display:flex;align-items:center;gap:2px;flex:1;justify-content:center}
.nav-link{padding:5px 11px;font-size:12px;color:#666;text-decoration:none;border-radius:7px;white-space:nowrap;transition:all .12s;cursor:pointer}
.nav-link:hover{background:#f5f5f5;color:#111}
#bar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
#cnt{font-size:11px;color:#aaa;white-space:nowrap}
#login-btn{padding:5px 13px;font-size:12px;border:1px solid #e0e0e0;border-radius:7px;cursor:pointer;background:#fff;color:#111;white-space:nowrap;transition:all .12s}
#login-btn:hover{background:#f5f5f5;border-color:#bbb}
#dark-toggle{display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:7px;cursor:pointer;border:1px solid #e0e0e0;background:#fff;font-size:14px;transition:all .12s;flex-shrink:0;user-select:none}
#dark-toggle:hover{background:#f5f5f5;border-color:#bbb}
body.dark{background:#141414;color:#eee}
body.dark #bar{background:#1a1a1a;border-color:#2a2a2a}
body.dark #si{background:#222;border-color:#333;color:#eee}
body.dark #si:focus{background:#2a2a2a;border-color:#555}
body.dark .nav-link{color:#aaa}
body.dark .nav-link:hover{background:#222;color:#eee}
body.dark #login-btn{background:#1a1a1a;border-color:#333;color:#ddd}
body.dark #login-btn:hover{background:#222;border-color:#555}
body.dark #dark-toggle{background:#1a1a1a;border-color:#333;color:#ddd}
body.dark #dark-toggle:hover{background:#222}
body.dark #chiprow{background:#1a1a1a;border-color:#2a2a2a}
body.dark .rchip{background:#1a1a1a;border-color:#2a2a2a;color:#888}
body.dark .rchip:hover{border-color:#555;color:#ddd}
body.dark .rchip.on{background:#eee;color:#111;border-color:#eee}
body.dark #filters{background:#1a1a1a;border-color:#2a2a2a}
body.dark .fsection{border-color:#252525}
body.dark .fsection-hd{color:#ddd}
body.dark .frow:hover{background:#222}
body.dark .frow label{color:#aaa}
body.dark #filter-reset{background:#222;border-color:#333;color:#888}
body.dark #filter-reset:hover{background:#2a2a2a;color:#ccc}
body.dark #panel{background:#1a1a1a;border-color:#2a2a2a}
body.dark #ph{border-color:#252525}
body.dark #pt{color:#ddd}
body.dark #ps{color:#555}
body.dark .hcard{border-color:#252525;background:#1a1a1a}
body.dark .hcard:hover{border-color:#444;background:#222}
body.dark .hcard.sel{border-color:#aaa;background:#222}
body.dark .hc-name{color:#ddd}
body.dark .hc-city{color:#555}
body.dark .hc-tag{border-color:#2a2a2a;color:#555}
body.dark .hc-stats{border-color:#252525}
body.dark .hc-stat{border-color:#252525}
body.dark .hc-stat-lbl{color:#444}
body.dark .hc-stat-val{color:#ddd}
body.dark .hc-stat-val.mt{color:#444}
body.dark #cnt{color:#555}
body.dark .leaflet-popup-content-wrapper{background:#1e1e1e!important;border-color:#333!important}
body.dark .leaflet-popup-tip{background:#1e1e1e!important}
body.dark .pop-name{color:#ddd}
body.dark .pop-city{color:#777}
body.dark .pop-tag{background:#252525;border-color:#333;color:#777}
#chiprow{display:flex;gap:6px;padding:7px 14px;background:#fff;border-bottom:1px solid #e8e8e8;overflow-x:auto;flex-shrink:0}
#chiprow::-webkit-scrollbar{display:none}
.rchip{padding:4px 11px;border-radius:100px;border:1px solid #e0e0e0;font-size:11px;cursor:pointer;white-space:nowrap;background:#fff;color:#888;transition:all .12s;user-select:none;flex-shrink:0}
.rchip:hover{border-color:#999;color:#111}
.rchip.on{background:#111;color:#fff;border-color:#111}
#body{flex:1;display:flex;overflow:hidden}

/* Left filter sidebar */
#filters{width:200px;flex-shrink:0;background:#fff;border-right:1px solid #e8e8e8;display:flex;flex-direction:column;overflow-y:auto}
#filters::-webkit-scrollbar{width:3px}
#filters::-webkit-scrollbar-thumb{background:#e0e0e0;border-radius:2px}
.fsection{border-bottom:1px solid #f0f0f0}
.fsection-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;font-size:11px;font-weight:500;color:#111;cursor:pointer;user-select:none}
.fsection-hd .arr{font-size:8px;color:#bbb;transition:transform .15s;margin-left:4px}
.fsection-hd.open .arr{transform:rotate(180deg)}
.fsection-body{padding:2px 0 8px;display:none}
.fsection-body.open{display:block}
.frow{display:flex;align-items:center;gap:8px;padding:4px 13px;cursor:pointer}
.frow:hover{background:#f7f7f7}
.frow input[type=checkbox]{width:13px;height:13px;accent-color:#111;cursor:pointer;flex-shrink:0;margin:0}
.frow label{font-size:11px;color:#555;cursor:pointer;flex:1;line-height:1.3}
#filter-reset{margin:10px 13px 13px;padding:6px;font-size:11px;background:#f5f5f5;border:1px solid #e8e8e8;border-radius:7px;cursor:pointer;color:#777;text-align:center;transition:all .12s}
#filter-reset:hover{background:#eee;color:#111}

/* Map */
#map{flex:1;z-index:1;min-width:0}
.leaflet-container{background:#f0ede8}
.leaflet-control-zoom{border:1px solid #ddd!important;border-radius:8px!important;overflow:hidden;box-shadow:none!important}
.leaflet-control-zoom a{color:#111!important;background:#fff!important;border:none!important;width:26px!important;height:26px!important;line-height:26px!important}
.leaflet-popup-content-wrapper{border-radius:10px!important;box-shadow:0 2px 12px rgba(0,0,0,.12)!important;border:1px solid #e8e8e8!important;background:#fff!important;padding:0!important}
.leaflet-popup-content{margin:12px 14px!important;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif!important}
.leaflet-popup-tip{background:#fff!important}
.leaflet-popup-close-button{color:#aaa!important;font-size:16px!important;top:6px!important;right:8px!important}
.pop-name{font-size:13px;font-weight:500;margin-bottom:2px;padding-right:16px;color:#111}
.pop-city{font-size:11px;color:#888;margin-bottom:8px}
.pop-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.pop-tag{padding:2px 7px;border-radius:100px;font-size:10px;border:1px solid #ebebeb;background:#f7f7f7;color:#888}
.pop-btn{display:block;text-align:center;padding:6px 12px;background:#111;color:#fff;border-radius:8px;font-size:11px;font-weight:500;text-decoration:none}
.pop-btn:hover{background:#333}

/* Right hotel list panel */
#panel{width:272px;flex-shrink:0;background:#fff;border-left:1px solid #e8e8e8;display:flex;flex-direction:column;overflow:hidden}
#ph{padding:11px 13px 8px;border-bottom:1px solid #e8e8e8;flex-shrink:0}
#pt{font-size:12px;font-weight:500}
#ps{font-size:10px;color:#aaa;margin-top:1px}
#list{flex:1;overflow-y:auto;padding:6px}
#list::-webkit-scrollbar{width:3px}
#list::-webkit-scrollbar-thumb{background:#e0e0e0;border-radius:2px}

/* Hotel cards */
.hcard{padding:10px 11px;border-radius:10px;border:1px solid #ebebeb;margin-bottom:6px;cursor:pointer;transition:all .12s}
.hcard:hover{border-color:#bbb;background:#fafafa}
.hcard.sel{border-color:#111;background:#fafafa}
.hc-name{font-size:12px;font-weight:500;margin-bottom:1px;line-height:1.3;color:#111}
.hc-city{font-size:10px;color:#bbb;margin-bottom:5px}
.hc-tags{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:7px}
.hc-tag{padding:1px 6px;border-radius:100px;font-size:10px;border:1px solid #ebebeb;color:#aaa}
.hc-stats{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid #f2f2f2;padding-top:7px;gap:0}
.hc-stat{text-align:center;padding:0 2px}
.hc-stat:not(:last-child){border-right:1px solid #f2f2f2}
.hc-stat-lbl{font-size:9px;color:#ccc;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.hc-stat-val{font-size:11px;font-weight:500;color:#111}
.hc-stat-val.mt{color:#ccc;font-weight:400;font-size:10px}

#empty{padding:24px;text-align:center;font-size:12px;color:#bbb;display:none}
</style>
</head>
<body>
<div id="wrap">
  <div id="bar">
    <div id="logo">Luxury Hotels <em>· Map</em></div>

        </div>
      </div>

      <div class="fsection">
        <div class="fsection-hd" onclick="toggleF(this)">Size (rooms) <span class="arr">▼</span></div>
        <div class="fsection-body">
          <div class="frow"><input type="checkbox" id="s-xs" value="xs" onchange="applyFilters()"><label for="s-xs">&lt; 50 rooms</label></div>
          <div class="frow"><input type="checkbox" id="s-sm" value="sm" onchange="applyFilters()"><label for="s-sm">50 – 150</label></div>
          <div class="frow"><input type="checkbox" id="s-md" value="md" onchange="applyFilters()"><label for="s-md">151 – 400</label></div>
          <div class="frow"><input type="checkbox" id="s-lg" value="lg" onchange="applyFilters()"><label for="s-lg">400+ rooms</label></div>
        </div>
      </div>

      <div class="fsection">
        <div class="fsection-hd" onclick="toggleF(this)">Star rating <span class="arr">▼</span></div>
        <div class="fsection-body">
          <div class="frow"><input type="checkbox" id="st-5" value="5" onchange="applyFilters()"><label for="st-5">5 star</label></div>
          <div class="frow"><input type="checkbox" id="st-45" value="4.5" onchange="applyFilters()"><label for="st-45">4.5 star</label></div>
          <div class="frow"><input type="checkbox" id="st-4" value="4" onchange="applyFilters()"><label for="st-4">4 star</label></div>
        </div>
      </div>

      <div class="fsection">
        <div class="fsection-hd" onclick="toggleF(this)">Amenities <span class="arr">▼</span></div>
        <div class="fsection-body">
          <div class="frow"><input type="checkbox" id="a-Beach" value="Beach" onchange="applyFilters()"><label for="a-Beach">Beach</label></div>
          <div class="frow"><input type="checkbox" id="a-Golf" value="Golf" onchange="applyFilters()"><label for="a-Golf">Golf</label></div>
          <div class="frow"><input type="checkbox" id="a-Spa" value="Spa" onchange="applyFilters()"><label for="a-Spa">Spa</label></div>
          <div class="frow"><input type="checkbox" id="a-Ski" value="Ski" onchange="applyFilters()"><label for="a-Ski">Ski</label></div>
        </div>
      </div>

      <div id="filter-reset" onclick="resetFilters()">Reset all filters</div>
    </div>

    <div id="map"></div>

    <!-- Right hotel list -->
    <div id="panel">
      <div id="ph">
        <div id="pt">Properties</div>
        <div id="ps"></div>
      </div>
      <div id="list"></div>
      <div id="empty">No properties match your filters.</div>
    </div>
  </div>
</div>

function sizeKey(r){if(r===null)return null;if(r<50)return'xs';if(r<=150)return'sm';if(r<=400)return'md';return'lg';}
function getChecked(pfx){return[...document.querySelectorAll(`input[type=checkbox][id^="${pfx}-"]:checked`)].map(c=>c.value);}

let activeRegion='all',searchQ='',selectedId=null,markers=[];

function filtered(){
  const brands=getChecked('b'),sizes=getChecked('s'),stars=getChecked('st'),amen=getChecked('a');
  return FS.filter(h=>{
    const q=searchQ.toLowerCase();
    if(q&&!h.name.toLowerCase().includes(q)&&!h.city.toLowerCase().includes(q))return false;
    if(activeRegion!=='all'&&h.region!==activeRegion)return false;
    if(brands.length&&!brands.includes(h.brand))return false;
    if(sizes.length){const k=sizeKey(h.rooms);if(!k||!sizes.includes(k))return false;}
    if(stars.length&&(h.stars===null||!stars.includes(String(h.stars))))return false;
    if(amen.length&&!amen.every(a=>h.tags.includes(a)))return false;
    return true;
  });
}

const map=L.map('map',{zoomControl:true,attributionControl:true}).setView([20,10],2);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:19,attribution:'© OpenStreetMap © CARTO'}).addTo(map);

const BRAND_COLOR={
  'Four Seasons': {pin:'#c8a96e', border:'#a08050'},
  'Hyatt':        {pin:'#4B77A9', border:'#3a5f8a'},
  'Hilton':       {pin:'#39FF14', border:'#28cc0f'},
  'Marriott':     {pin:'#B41F3A', border:'#8f1830'},
  'IHG':          {pin:'#E15F27', border:'#b54a1e'},
  'Accor':        {pin:'#FFCB05', border:'#cc9f00'},
  'Boutique':     {pin:'#a9916e', border:'#8a7350'},
};

function makeIcon(sel, brand){
  const c=BRAND_COLOR[brand]||{pin:'#aaa',border:'#888'};
  const bg=sel?'#111':c.pin;
  const bd=sel?'#111':c.border;
  return L.divIcon({className:'',html:`<div style="width:10px;height:10px;border-radius:50%;background:${bg};border:2px solid ${bd};box-shadow:0 1px 4px rgba(0,0,0,.2);cursor:pointer"></div>`,iconSize:[10,10],iconAnchor:[5,5]});
}

function renderMarkers(){
  markers.forEach(m=>map.removeLayer(m.layer));markers=[];
  filtered().forEach(h=>{
    const idx=FS.indexOf(h);
    const m=L.marker([h.lat,h.lng],{icon:makeIcon(selectedId===idx,h.brand)}).addTo(map);
    m.on('click',()=>selectHotel(idx));
    markers.push({layer:m,idx});
  });
}

function selectHotel(idx){
  selectedId=idx;renderMarkers();renderList();
  const h=FS[idx];
  L.popup({closeButton:true,maxWidth:220})
    .setLatLng([h.lat,h.lng])
    .setContent(`<div class="pop-name">${h.name}</div><div class="pop-city">${h.city}</div><div class="pop-tags">${h.tags.map(t=>`<span class="pop-tag">${t}</span>`).join('')}</div><a class="pop-btn" href="${h.url}" target="_blank">View hotel ↗</a>`)
    .openOn(map);
  const el=document.getElementById('hc-'+idx);
  if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function statCell(val,empty){
  return val!==null?`<span class="hc-stat-val">${val}</span>`:`<span class="hc-stat-val mt">${empty}</span>`;
}

function renderList(){
  const vis=filtered();
  document.getElementById('cnt').textContent=vis.length+' hotels';
  document.getElementById('ps').textContent=vis.length+' shown';
  const list=document.getElementById('list'),empty=document.getElementById('empty');
  if(!vis.length){list.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  list.innerHTML=vis.map(h=>{
    const idx=FS.indexOf(h),sel=selectedId===idx;
    return`<div class="hcard${sel?' sel':''}" id="hc-${idx}" onclick="selectHotel(${idx})">
      <div class="hc-name">${h.name}</div>
      <div class="hc-city">${h.city} · ${h.region}</div>
      <div class="hc-tags">${h.tags.map(t=>`<span class="hc-tag">${t}</span>`).join('')}</div>
      <div class="hc-stats">
        <div class="hc-stat"><div class="hc-stat-lbl">Rooms</div>${statCell(h.rooms,'—')}</div>
        <div class="hc-stat"><div class="hc-stat-lbl">Opened</div>${statCell(h.opened,'—')}</div>
        <div class="hc-stat"><div class="hc-stat-lbl">Renovated</div>${statCell(h.renovated,'—')}</div>
      </div>
    </div>`;
  }).join('');
}

function applyFilters(){selectedId=null;map.closePopup();renderMarkers();renderList();}

function toggleF(hd){
  hd.classList.toggle('open');
  hd.nextElementSibling.classList.toggle('open');
}

function resetFilters(){
  document.querySelectorAll('#filters input[type=checkbox][id^="b-"]').forEach(c=>c.checked=true);
  document.querySelectorAll('#filters input[type=checkbox]:not([id^="b-"])').forEach(c=>c.checked=false);
  document.querySelectorAll('.rchip').forEach(c=>c.classList.toggle('on',c.dataset.r==='all'));
  activeRegion='all';searchQ='';document.getElementById('si').value='';
  applyFilters();
}

document.querySelectorAll('.rchip').forEach(c=>c.addEventListener('click',()=>{
  document.querySelectorAll('.rchip').forEach(x=>x.classList.remove('on'));
  c.classList.add('on');activeRegion=c.dataset.r;applyFilters();
}));
document.getElementById('si').addEventListener('input',e=>{searchQ=e.target.value;applyFilters();});

renderMarkers();renderList();

function toggleDark(){
  const dark=document.body.classList.toggle('dark');
  document.getElementById('dark-toggle').textContent=dark?'○':'☽';
}
